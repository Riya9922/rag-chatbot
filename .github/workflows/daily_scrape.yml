name: Daily MF Data Scrape

on:
  schedule:
    - cron: '45 3 * * *' # 09:15 AM IST (03:45 UTC)
  workflow_dispatch: # Allows manual trigger

jobs:
  scrape-and-ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          USER_AGENT: ${{ secrets.USER_AGENT }}
        run: python src/phase_1_ingestion/scraper.py --once

      - name: Run Ingestion
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CHROMA_CLOUD_HOST: ${{ secrets.CHROMA_CLOUD_HOST }}
          CHROMA_CLOUD_API_KEY: ${{ secrets.CHROMA_CLOUD_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          PYTHONPATH: .
        run: python src/phase_2_indexing/ingestion.py

      - name: Commit Updated Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/raw/ data/fund_summary.json data/vector_db/
          git commit -m "chore: daily data refresh $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
