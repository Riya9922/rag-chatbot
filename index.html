<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutual Fund FAQ Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --chat-bg: rgba(255, 255, 255, 0.05);
            --chat-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --user-msg: rgba(59, 130, 246, 0.2);
            --bot-msg: rgba(255, 255, 255, 0.08);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: var(--chat-bg);
            border: 1px solid var(--chat-border);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--chat-border);
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg);
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bot-msg);
            border-bottom-left-radius: 4px;
        }

        .citation {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 8px;
            border-top: 1px solid var(--chat-border);
            padding-top: 8px;
        }

        .citation a {
            color: #60a5fa;
            text-decoration: none;
        }

        .citation a:hover {
            text-decoration: underline;
        }

        .suggestions {
            display: flex;
            gap: 10px;
            padding: 0 20px 10px;
            overflow-x: auto;
        }

        .suggestion-btn {
            background: var(--chat-bg);
            border: 1px solid var(--chat-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid var(--chat-border);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--chat-border);
            color: var(--text-main);
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: var(--primary);
        }

        .input-area button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: var(--primary-hover);
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--bot-msg);
            padding: 12px 16px;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
        }

        .dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        /* Markdown support basics */
        .message.bot p { margin: 0 0 10px 0; }
        .message.bot p:last-child { margin: 0; }
        .message.bot ul { margin: 0; padding-left: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Mutual Fund FAQ Assistant</h1>
            <p>Facts‑Only. No investment advice.</p>
        </div>

        <div class="chat-container" id="chat-container">
            <div class="message bot">
                Hello! I am your factual Mutual Fund assistant. Ask me questions about HDFC mutual funds, such as expense ratios, minimum SIPs, or exit loads.
            </div>
        </div>

        <div class="typing-indicator" id="typing">
            <div class="dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="suggestions">
            <button class="suggestion-btn" onclick="sendSuggestion('What is the expense ratio of HDFC Mid-Cap Fund?')">Expense ratio of HDFC Mid-Cap?</button>
            <button class="suggestion-btn" onclick="sendSuggestion('Minimum SIP for HDFC ELSS Tax Saver?')">Min SIP for HDFC ELSS?</button>
            <button class="suggestion-btn" onclick="sendSuggestion('What is the exit load for HDFC Focused Fund?')">Exit load for HDFC Focused?</button>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask a factual question about HDFC funds..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing');

        function sendSuggestion(text) {
            userInput.value = text;
            sendMessage();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const query = userInput.value.trim();
            if (!query) return;

            // Add user message
            appendMessage(query, 'user');
            userInput.value = '';
            
            // Show typing indicator
            typingIndicator.style.display = 'flex';
            chatContainer.appendChild(typingIndicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                const data = await response.json();
                typingIndicator.style.display = 'none';

                if (!response.ok) {
                    appendMessage(`Error: ${data.detail || 'Failed to fetch answer'}`, 'bot');
                    return;
                }

                let botContent = marked.parse(data.response);
                if (data.source_url && data.source_url !== 'Unknown') {
                    botContent += `
                        <div class="citation">
                            <a href="${data.source_url}" target="_blank">Source Link</a><br>
                            <em>Last updated from sources: ${data.scraped_at || 'N/A'}</em>
                        </div>
                    `;
                }
                
                appendMessage(botContent, 'bot', true);
            } catch (error) {
                typingIndicator.style.display = 'none';
                appendMessage(`Network Error: ${error.message}`, 'bot');
            }
        }

        function appendMessage(content, sender, isHtml = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            if (isHtml) {
                msgDiv.innerHTML = content;
            } else {
                msgDiv.textContent = content;
            }
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
